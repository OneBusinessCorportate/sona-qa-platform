name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npm run install:all

      - name: Type-check (server + client)
        run: npm run typecheck

      - name: Test (server)
        run: npm test

      - name: Build client
        run: npm --prefix client run build
